<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Login Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <script src="config.js"></script>
</head>
<body>
  <div class="container">
    <div class="card" style="max-width: 500px; margin: 50px auto;">
      <h2>🔐 Reset Password</h2>
      <p class="text-muted">Enter your new password</p>
      
      <form onsubmit="resetPassword(event)">
        <div class="form-group">
          <label>New Password</label>
          <input type="password" id="password" placeholder="Min 8 chars, uppercase, lowercase, number" required>
          <small>Must contain: uppercase, lowercase, number (min 8 chars)</small>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
        </div>
        <button type="submit" class="btn btn-primary">Reset Password</button>
      </form>
      
      <div id="message"></div>
      
      <p class="text-center"><a href="login.html">Back to Login</a></p>
    </div>
  </div>

  <script>
    const API_URL = window.API_URL;

    async function resetPassword(e) {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const messageDiv = document.getElementById('message');

      if (password !== confirmPassword) {
        messageDiv.innerHTML = `<p class="error">❌ Passwords do not match</p>`;
        return;
      }

      // Get token from URL
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');

      if (!token) {
        messageDiv.innerHTML = `<p class="error">❌ Invalid reset link</p>`;
        return;
      }

      try {
        const res = await fetch(`${API_URL}/auth/reset-password/${token}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });

        const data = await res.json();

        if (res.ok) {
          messageDiv.innerHTML = `<p class="success">✅ ${data.message}</p>`;
          setTimeout(() => window.location.href = 'login.html', 2000);
        } else {
          messageDiv.innerHTML = `<p class="error">❌ ${data.error}</p>`;
        }
      } catch (error) {
        messageDiv.innerHTML = `<p class="error">❌ Reset failed: ${error.message}</p>`;
      }
    }
  </script>
</body>
</html>
