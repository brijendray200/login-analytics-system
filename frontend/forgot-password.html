<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Login Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <script src="config.js"></script>
</head>
<body>
  <div class="container">
    <div class="card" style="max-width: 500px; margin: 50px auto;">
      <h2>🔑 Forgot Password</h2>
      <p class="text-muted">Enter your email to receive a password reset link</p>
      
      <form onsubmit="forgotPassword(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="your@email.com" required>
        </div>
        <button type="submit" class="btn btn-primary">Send Reset Link</button>
      </form>
      
      <div id="message"></div>
      
      <p class="text-center">Remember your password? <a href="login.html">Login here</a></p>
    </div>
  </div>

  <script>
    const API_URL = window.API_URL;

    async function forgotPassword(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const messageDiv = document.getElementById('message');

      try {
        const res = await fetch(`${API_URL}/auth/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (res.ok) {
          messageDiv.innerHTML = `<p class="success">✅ ${data.message}</p>`;
          document.querySelector('form').reset();
        } else {
          messageDiv.innerHTML = `<p class="error">❌ ${data.error}</p>`;
        }
      } catch (error) {
        messageDiv.innerHTML = `<p class="error">❌ Request failed: ${error.message}</p>`;
      }
    }
  </script>
</body>
</html>
