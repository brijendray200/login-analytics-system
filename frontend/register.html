<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Login Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="card" style="max-width: 500px; margin: 50px auto;">
      <h2>📝 Register</h2>
      
      <form onsubmit="register(event)">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="name" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Min 8 chars, uppercase, lowercase, number" required>
          <small>Must contain: uppercase, lowercase, number (min 8 chars)</small>
        </div>
        <button type="submit" class="btn btn-primary">Register</button>
      </form>
      
      <div id="message"></div>
      
      <p class="text-center">Already have an account? <a href="login.html">Login here</a></p>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3000/api';

    async function register(e) {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const messageDiv = document.getElementById('message');

      try {
        const res = await fetch(`${API_URL}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          messageDiv.innerHTML = `<p class="error">❌ ${data.error}</p>`;
          return;
        }

        messageDiv.innerHTML = `<p class="success">✅ ${data.message}</p>`;
        setTimeout(() => window.location.href = 'login.html', 2000);
      } catch (error) {
        messageDiv.innerHTML = `<p class="error">❌ Registration failed: ${error.message}</p>`;
      }
    }
  </script>
</body>
</html>
